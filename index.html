<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Wisata Alam Indonesia</title>

<link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: 9999;
}

.popupContainer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  width: 320px;
  padding: 20px;
  border-radius: 10px;
}

.user_register {
  display: none;
}

button {
  margin-top: 10px;
  width: 100%;
}

/* HEADER */
header {
  background: #222;
  padding: 10px;
  color: white;
}

header a {
  color: white;
  margin-right: 15px;
  text-decoration: none;
}

/* BANNER */
.banner {
  text-align: center;
  padding: 50px;
  background: #eee;
}
</style>
</head>

<body>

<header>
  <a href="#">Beranda</a>
  <a href="#">Destinasi</a>
  <a href="#">Kategori</a>

  <button id="modal_trigger">Masuk / Daftar</button>
</header>

<div class="banner">
  <h1>Jelajahi Keindahan Wisata Alam Indonesia 🌿</h1>
  <p>Gunung, pantai, air terjun… semua ada. Tinggal niat doang.</p>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="popupContainer">
    
    <h3 id="judulForm">Masuk</h3>

    <!-- LOGIN -->
    <div class="user_login">
      <form id="formLogin">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Kata sandi" required>
        <button type="submit">Masuk</button>
      </form>
      <p onclick="tampilRegister()" style="cursor:pointer;color:blue;">Belum punya akun? Daftar</p>
    </div>

    <!-- REGISTER -->
    <div class="user_register">
      <form id="formRegister">
        <input type="text" placeholder="Nama pengguna" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Kata sandi" required>
        <button type="submit">Daftar</button>
      </form>
      <p onclick="tampilLogin()" style="cursor:pointer;color:blue;">Sudah punya akun? Masuk</p>
    </div>

    <button onclick="tutupModal()">Tutup</button>
  </div>
</div>

<script>

// buka modal
document.getElementById("modal_trigger").onclick = function(){
  document.getElementById("modal").style.display = "block";
}

// tutup modal
function tutupModal(){
  document.getElementById("modal").style.display = "none";
}

// pindah ke register
function tampilRegister(){
  document.querySelector(".user_login").style.display = "none";
  document.querySelector(".user_register").style.display = "block";
  document.getElementById("judulForm").innerText = "Daftar";
}

// pindah ke login
function tampilLogin(){
  document.querySelector(".user_login").style.display = "block";
  document.querySelector(".user_register").style.display = "none";
  document.getElementById("judulForm").innerText = "Masuk";
}

// REGISTER
document.getElementById("formRegister").addEventListener("submit", function(e){
  e.preventDefault();

  let nama = document.querySelector('#formRegister input[type="text"]').value;
  let email = document.querySelector('#formRegister input[type="email"]').value;
  let password = document.querySelector('#formRegister input[type="password"]').value;

  let user = {
    nama: nama,
    email: email,
    password: password
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Akun berhasil dibuat 😎");
  tampilLogin();
});

// LOGIN
document.getElementById("formLogin").addEventListener("submit", function(e){
  e.preventDefault();

  let email = document.querySelector('#formLogin input[type="email"]').value;
  let password = document.querySelector('#formLogin input[type="password"]').value;

  let user = JSON.parse(localStorage.getItem("user"));

  if(user && email === user.email && password === user.password){
    alert("Login berhasil 🎉");
    tutupModal();
  } else {
    alert("Email atau kata sandi salah 😑");
  }
});

</script>

</body>
</html>
